<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<meta name="theme-color" content="#0a0a16" />
<meta name="description" content="CryVeth - Premium Financial Platform with Real-time Market Data, 30+ Tools, and Financial Education" />
<title>CryVeth — Premium Financial Platform</title>

<!-- React + Babel (single file build) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Chart.js for live charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
/* =========================================================
   CryVeth – Global Design System
   Dark Glassmorphism + Neon RGB accents
   Mobile-first responsive layout
   ========================================================= */
:root{
  --bg-0:#06060f;
  --bg-1:#0b0b1e;
  --bg-2:#101030;
  --glass: rgba(255,255,255,0.04);
  --glass-strong: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --text:#e8ecff;
  --text-dim:#9aa3c7;
  --text-mute:#646b8c;

  --neon-1:#00e5ff;     /* cyan */
  --neon-2:#7a5cff;     /* purple */
  --neon-3:#ff3df0;     /* magenta */
  --neon-4:#00ff9d;     /* green  */
  --neon-5:#ffb800;     /* gold   */
  --neon-6:#ff4d6d;     /* red    */

  --grad-1:linear-gradient(135deg,#00e5ff 0%,#7a5cff 50%,#ff3df0 100%);
  --grad-2:linear-gradient(135deg,#00ff9d 0%,#00e5ff 100%);
  --grad-3:linear-gradient(135deg,#ff4d6d 0%,#ffb800 100%);
  --grad-card:linear-gradient(135deg, rgba(122,92,255,0.08), rgba(0,229,255,0.04));

  --shadow-neon:0 0 24px rgba(122,92,255,.35), 0 0 48px rgba(0,229,255,.15);
  --radius:16px;
  --radius-sm:10px;
}

/* Light theme tokens (toggle via [data-theme="light"]) */
[data-theme="light"]{
  --bg-0:#f3f5ff;
  --bg-1:#ffffff;
  --bg-2:#eef0fb;
  --glass: rgba(15,18,40,0.04);
  --glass-strong: rgba(15,18,40,0.08);
  --border: rgba(15,18,40,0.10);
  --text:#0b0f24;
  --text-dim:#3a4068;
  --text-mute:#6c7497;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;
  background:var(--bg-0);
  color:var(--text);
  overflow-x:hidden;
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

/* Animated background aurora */
body::before{
  content:'';position:fixed;inset:-20%;z-index:-2;
  background:
    radial-gradient(circle at 15% 20%, rgba(122,92,255,.18), transparent 40%),
    radial-gradient(circle at 85% 30%, rgba(0,229,255,.14), transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(255,61,240,.12), transparent 50%);
  filter:blur(60px);
  animation: aurora 18s ease-in-out infinite alternate;
}
@keyframes aurora{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(-3%,2%) scale(1.05)}
}

/* Grid pattern overlay */
body::after{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:
    linear-gradient(rgba(122,92,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(122,92,255,.04) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse at center, rgba(0,0,0,.6), transparent 80%);
}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--neon-2),var(--neon-1));border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,var(--neon-3),var(--neon-2))}

/* ========================= LAYOUT ========================= */
.app{
  display:grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: 64px 1fr;
  grid-template-areas:
    "sidebar topbar"
    "sidebar main";
  min-height:100vh;
  transition: grid-template-columns .3s ease;
}
.app.collapsed{ grid-template-columns: 76px 1fr; }

/* ============== SIDEBAR ============== */
.sidebar{
  grid-area:sidebar;
  background:linear-gradient(180deg, rgba(11,11,30,.85), rgba(6,6,15,.95));
  backdrop-filter: blur(20px);
  border-right:1px solid var(--border);
  padding:16px 14px;
  position:sticky; top:0; height:100vh;
  overflow-y:auto;
  z-index:50;
  transition:transform .3s ease;
}
.brand{
  display:flex;align-items:center;gap:12px;
  padding:6px 8px 18px;
  border-bottom:1px solid var(--border);
  margin-bottom:14px;
}
.brand-logo{
  width:38px;height:38px;border-radius:11px;
  background:var(--grad-1);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-neon);
  position:relative;
  flex-shrink:0;
}
.brand-logo::after{
  content:'';position:absolute;inset:2px;border-radius:9px;
  background:rgba(6,6,15,.85);
  display:flex;align-items:center;justify-content:center;
}
.brand-logo svg{position:relative;z-index:1}
.brand-name{font-size:18px;font-weight:800;letter-spacing:.5px;
  background:var(--grad-1);-webkit-background-clip:text;background-clip:text;color:transparent;
  white-space:nowrap;
}
.brand-tag{font-size:10px;color:var(--text-mute);letter-spacing:2px;text-transform:uppercase}

.nav-section{margin:10px 0 8px;padding:0 8px;font-size:10px;letter-spacing:2px;color:var(--text-mute);text-transform:uppercase}

.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:10px;
  color:var(--text-dim);
  cursor:pointer;font-size:13.5px;font-weight:500;
  transition:all .2s ease;
  position:relative;
  margin-bottom:2px;
  border:1px solid transparent;
}
.nav-item:hover{
  background:var(--glass);
  color:var(--text);
  transform:translateX(2px);
}
.nav-item.active{
  background:linear-gradient(90deg, rgba(122,92,255,.18), rgba(0,229,255,.06));
  color:#fff;
  border-color: rgba(122,92,255,.35);
  box-shadow: inset 0 0 12px rgba(122,92,255,.15);
}
.nav-item.active::before{
  content:'';position:absolute;left:-14px;top:8px;bottom:8px;width:3px;
  background:var(--grad-1);border-radius:2px;
  box-shadow:0 0 10px var(--neon-2);
}
.nav-item .icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nav-item .badge{
  margin-left:auto;font-size:9px;background:var(--grad-3);
  padding:2px 7px;border-radius:8px;color:#fff;font-weight:700;letter-spacing:.5px;
}

.app.collapsed .brand-name,
.app.collapsed .brand-tag,
.app.collapsed .nav-item span:not(.icon-wrap),
.app.collapsed .nav-section,
.app.collapsed .nav-item .badge,
.app.collapsed .sidebar-footer{ display:none }
.app.collapsed .nav-item{justify-content:center;padding:11px 0}
.app.collapsed .brand{justify-content:center}

.sidebar-footer{
  margin-top:20px;padding:14px;border-radius:14px;
  background:var(--grad-card);
  border:1px solid var(--border);
  text-align:center;
}
.sidebar-footer h4{font-size:13px;margin-bottom:6px;background:var(--grad-1);-webkit-background-clip:text;background-clip:text;color:transparent}
.sidebar-footer p{font-size:11px;color:var(--text-dim);margin-bottom:10px;line-height:1.4}
.btn-pro{
  width:100%;padding:8px;border:none;border-radius:8px;
  background:var(--grad-1);color:#fff;font-weight:700;cursor:pointer;font-size:12px;
  box-shadow:var(--shadow-neon);
}

/* ============== TOPBAR ============== */
.topbar{
  grid-area:topbar;
  display:flex;align-items:center;gap:14px;
  padding:0 22px;
  background:rgba(11,11,30,.6);
  backdrop-filter: blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:40;
}
.menu-btn{
  display:none;background:var(--glass);border:1px solid var(--border);
  color:var(--text);padding:8px;border-radius:10px;cursor:pointer;
}
.search-wrap{
  flex:1;max-width:520px;position:relative;
}
.search-input{
  width:100%;padding:10px 14px 10px 40px;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:12px;color:var(--text);font-size:13px;
  transition:.2s;
}
.search-input:focus{outline:none;border-color:var(--neon-2);box-shadow:0 0 0 3px rgba(122,92,255,.15)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-mute)}

.topbar-actions{display:flex;align-items:center;gap:10px;margin-left:auto}
.icon-btn{
  width:38px;height:38px;border-radius:11px;
  background:var(--glass);border:1px solid var(--border);
  color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.2s;position:relative;
}
.icon-btn:hover{color:#fff;border-color:var(--neon-2);box-shadow:0 0 12px rgba(122,92,255,.3)}
.icon-btn .dot{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--neon-3);box-shadow:0 0 8px var(--neon-3);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.6}}

.profile{
  display:flex;align-items:center;gap:10px;padding:5px 12px 5px 5px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:30px;cursor:pointer;transition:.2s;
}
.profile:hover{border-color:var(--neon-2)}
.avatar{
  width:30px;height:30px;border-radius:50%;
  background:var(--grad-1);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:12px;color:#fff;
}
.profile-name{font-size:12.5px;font-weight:600}
.profile-role{font-size:10px;color:var(--text-mute)}

/* ============== MAIN ============== */
.main{
  grid-area:main;
  padding:22px;
  overflow-y:auto;
  animation: fadeIn .5s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.page-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.page-title{font-size:22px;font-weight:800;letter-spacing:.3px}
.page-title small{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-top:4px}

/* ============== CARDS / GLASS ============== */
.glass{
  background:var(--glass);
  backdrop-filter: blur(22px);
  border:1px solid var(--border);
  border-radius:var(--radius);
  position:relative;
  overflow:hidden;
}
.glass::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
}
.card{padding:18px}
.card-title{font-size:13px;color:var(--text-dim);font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.card-title .icon-wrap{
  width:28px;height:28px;border-radius:8px;
  background:var(--grad-card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}

/* ============== STAT CARDS ============== */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;margin-bottom:22px;
}
.stat{
  padding:18px;border-radius:var(--radius);
  position:relative;overflow:hidden;
  background:var(--glass);
  backdrop-filter: blur(20px);
  border:1px solid var(--border);
  transition:.3s;
  cursor:default;
}
.stat:hover{transform:translateY(-3px);border-color:var(--neon-2);box-shadow:var(--shadow-neon)}
.stat-glow{position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;filter:blur(40px);opacity:.4;pointer-events:none}
.stat-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.stat-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;
  position:relative;
}
.stat-label{font-size:11px;color:var(--text-mute);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:800;letter-spacing:.5px;font-variant-numeric:tabular-nums}
.stat-change{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;margin-top:8px;padding:3px 8px;border-radius:6px}
.up{color:var(--neon-4);background:rgba(0,255,157,.08)}
.down{color:var(--neon-6);background:rgba(255,77,109,.08)}

/* ============== GRID ============== */
.dash-grid{
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:18px;
  margin-bottom:22px;
}
.chart-wrap{height:300px;position:relative}

/* ============== TABLES ============== */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead th{text-align:left;font-size:10.5px;letter-spacing:1.5px;color:var(--text-mute);font-weight:600;padding:10px 8px;border-bottom:1px solid var(--border);text-transform:uppercase}
.tbl tbody td{padding:12px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
.tbl tbody tr{transition:.2s}
.tbl tbody tr:hover{background:var(--glass)}
.coin-cell{display:flex;align-items:center;gap:10px}
.coin-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:11px}
.coin-sym{font-weight:700}
.coin-name{font-size:11px;color:var(--text-mute)}
.mini-chart{height:36px;width:80px}

/* ============== TABS / PILLS ============== */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tab{
  padding:8px 14px;font-size:12px;border-radius:10px;
  background:var(--glass);border:1px solid var(--border);
  color:var(--text-dim);cursor:pointer;font-weight:600;
  transition:.2s;
}
.tab:hover{color:#fff}
.tab.active{background:var(--grad-1);color:#fff;border-color:transparent;box-shadow:var(--shadow-neon)}

/* ============== INPUTS / BUTTONS ============== */
.input, select.input, textarea.input{
  width:100%;padding:11px 13px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;
  transition:.2s;
}
.input:focus{outline:none;border-color:var(--neon-2);box-shadow:0 0 0 3px rgba(122,92,255,.15)}
label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.field{margin-bottom:12px}
.btn{
  padding:11px 18px;border:none;border-radius:10px;
  background:var(--grad-1);color:#fff;font-weight:700;cursor:pointer;font-size:13px;
  box-shadow:var(--shadow-neon);transition:.2s;
  display:inline-flex;align-items:center;gap:8px;justify-content:center;
}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:var(--glass);box-shadow:none;border:1px solid var(--border);color:var(--text)}
.btn.ghost:hover{border-color:var(--neon-2)}
.btn.success{background:var(--grad-2)}
.btn.danger{background:var(--grad-3)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}

/* ============== TOOLS GRID ============== */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.tool-card{
  padding:18px;border-radius:14px;cursor:pointer;
  background:var(--glass);border:1px solid var(--border);
  transition:.25s;position:relative;overflow:hidden;
}
.tool-card:hover{transform:translateY(-3px);border-color:var(--neon-2);box-shadow:var(--shadow-neon)}
.tool-card .tool-icon{
  width:44px;height:44px;border-radius:12px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;color:#fff;
  position:relative;
}
.tool-name{font-size:13.5px;font-weight:700;margin-bottom:4px}
.tool-desc{font-size:11.5px;color:var(--text-mute);line-height:1.4}

/* ============== MODAL ============== */
.modal-bd{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .25s ease}
.modal{
  background:linear-gradient(160deg, rgba(20,20,45,.96), rgba(10,10,25,.96));
  border:1px solid var(--border);border-radius:18px;
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
  box-shadow:0 30px 60px rgba(0,0,0,.5), 0 0 40px rgba(122,92,255,.2);
}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:22px}
.modal-close{background:var(--glass);border:1px solid var(--border);width:32px;height:32px;border-radius:8px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ============== EDUCATION / LEARN ============== */
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.lesson-card{
  padding:0;border-radius:16px;overflow:hidden;cursor:pointer;
  background:var(--glass);border:1px solid var(--border);
  transition:.25s;
}
.lesson-card:hover{transform:translateY(-4px);border-color:var(--neon-2);box-shadow:var(--shadow-neon)}
.lesson-hero{height:110px;position:relative;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:32px}
.lesson-body{padding:14px}
.lesson-title{font-size:14px;font-weight:700;margin-bottom:5px}
.lesson-desc{font-size:11.5px;color:var(--text-mute);line-height:1.5;margin-bottom:10px}
.progress-bar{height:5px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--grad-2);border-radius:10px;transition:width .5s ease;box-shadow:0 0 8px var(--neon-4)}
.lesson-meta{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text-mute);margin-top:8px}

/* ============== CHAT AI ============== */
.chat-wrap{display:flex;flex-direction:column;height:560px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px 14px;border-radius:14px;max-width:80%;font-size:13px;line-height:1.5;animation:fadeIn .3s ease}
.msg.bot{background:var(--glass);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:var(--grad-1);align-self:flex-end;border-bottom-right-radius:4px;color:#fff}
.chat-input-bar{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}

/* ============== NOTIFICATIONS DROP ============== */
.dropdown{
  position:absolute;top:50px;right:20px;width:340px;max-width:calc(100vw - 30px);
  background:linear-gradient(160deg, rgba(20,20,45,.98), rgba(10,10,25,.98));
  border:1px solid var(--border);border-radius:14px;z-index:60;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
  animation:fadeIn .2s ease;
  overflow:hidden;
}
.notif-item{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:.2s}
.notif-item:hover{background:var(--glass)}
.notif-item:last-child{border-bottom:none}
.notif-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.notif-txt{flex:1}
.notif-title{font-size:12.5px;font-weight:600;margin-bottom:2px}
.notif-time{font-size:10.5px;color:var(--text-mute)}

/* ============== AUTH ============== */
.auth-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
}
.auth-card{
  width:100%;max-width:420px;padding:32px;
  background:var(--glass);backdrop-filter:blur(28px);
  border:1px solid var(--border);border-radius:20px;
  box-shadow:0 30px 60px rgba(0,0,0,.4);
}
.auth-logo{display:flex;justify-content:center;margin-bottom:20px}

/* ============== QUIZ ============== */
.quiz-opt{
  padding:13px 16px;border-radius:10px;margin-bottom:10px;cursor:pointer;
  background:var(--glass);border:1px solid var(--border);
  font-size:13px;transition:.2s;display:flex;align-items:center;gap:10px;
}
.quiz-opt:hover{border-color:var(--neon-2)}
.quiz-opt.correct{background:rgba(0,255,157,.12);border-color:var(--neon-4);color:#fff}
.quiz-opt.wrong{background:rgba(255,77,109,.12);border-color:var(--neon-6);color:#fff}
.quiz-opt.selected{border-color:var(--neon-2);background:rgba(122,92,255,.15)}
.quiz-letter{
  width:26px;height:26px;border-radius:7px;background:var(--glass-strong);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;
}

/* ============== TX ROWS ============== */
.tx-row{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid rgba(255,255,255,.04)}
.tx-row:last-child{border-bottom:none}
.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff}
.tx-body{flex:1}
.tx-title{font-size:13px;font-weight:600}
.tx-sub{font-size:11px;color:var(--text-mute)}
.tx-amt{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums}

/* ============== TOAST ============== */
.toast-stack{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200}
.toast{
  padding:12px 16px;border-radius:12px;
  background:linear-gradient(160deg, rgba(20,20,45,.98), rgba(10,10,25,.98));
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.4), 0 0 18px rgba(122,92,255,.25);
  font-size:13px;display:flex;align-items:center;gap:10px;min-width:260px;
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* ============== UTIL ============== */
.flex{display:flex}.between{justify-content:space-between}.center{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}.mt-12{margin-top:12px}.mt-20{margin-top:20px}.mb-12{margin-bottom:12px}.mb-20{margin-bottom:20px}.wrap{flex-wrap:wrap}.grow{flex:1}.text-dim{color:var(--text-dim)}.text-mute{color:var(--text-mute)}.text-up{color:var(--neon-4)}.text-down{color:var(--neon-6)}.text-center{text-align:center}.fz-11{font-size:11px}.fz-12{font-size:12px}.fz-13{font-size:13px}.fz-14{font-size:14px}.fz-18{font-size:18px}.fz-24{font-size:24px}.fw-700{font-weight:700}.fw-800{font-weight:800}
.divider{height:1px;background:var(--border);margin:14px 0}
.grad-text{background:var(--grad-1);-webkit-background-clip:text;background-clip:text;color:transparent}
.live-dot{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:var(--neon-4);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.live-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--neon-4);box-shadow:0 0 8px var(--neon-4);animation:pulse 1.4s infinite}

.lvl-badge{
  display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;
  background:var(--grad-3);color:#fff;font-size:10.5px;font-weight:700;
  box-shadow:0 0 12px rgba(255,184,0,.4);

/* =========================================================
   Toast manager
   ========================================================= */
const ToastCtx = React.createContext(null);
const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = useState([]);
  const push = (msg, type='info') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  };
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="toast-stack">
        {toasts.map(t => {
          const color = t.type==='success'?'var(--neon-4)':t.type==='error'?'var(--neon-6)':'var(--neon-1)';
          return (
            <div key={t.id} className="toast">
              <div style={{width:8,height:8,borderRadius:50,background:color,boxShadow:`0 0 8px ${color}`}}/>
              <div>{t.msg}</div>
            </div>
          );
        })}
      </div>
    </ToastCtx.Provider>
  );
};
const useToast = () => React.useContext(ToastCtx);

const seed = (s) => () => { s = (s*9301 + 49297) % 233280; return s/233280; };
const fmt = (n, d=2) => (n||0).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtCur = (n, c='$') => `${c}${fmt(n)}`;
const fmtCompact = (n) => {
  if (Math.abs(n) >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (Math.abs(n) >= 1e9)  return (n/1e9 ).toFixed(2)+'B';
  if (Math.abs(n) >= 1e6)  return (n/1e6 ).toFixed(2)+'M';
  if (Math.abs(n) >= 1e3)  return (n/1e3 ).toFixed(2)+'K';
  return n.toFixed(2);
};

const useLiveMarket = () => {
  const [coins, setCoins] = useState(INITIAL_COINS);
  const [fx, setFx] = useState(INITIAL_FX);
  const [tick, setTick] = useState(0);

  useEffect(() => {
    const i = setInterval(() => {
      setCoins(prev => prev.map(c => {
        const drift = (Math.random()-0.5) * c.price * 0.004;
        const np = Math.max(0.0001, c.price + drift);
        const chg = c.change + (Math.random()-0.5) * 0.15;
        return { ...c, price: np, change: chg };
      }));
      setFx(prev => prev.map(f => {
        const drift = (Math.random()-0.5) * f.rate * 0.0015;
        return { ...f, rate: f.rate + drift, change: f.change + (Math.random()-0.5)*0.08 };
      }));
      setTick(t => t+1);
    }, 2500);
    return () => clearInterval(i);
  }, []);
  return { coins, fx, tick };
};

/* =========================================================
   Mini sparkline canvas (per row)
   ========================================================= */
const Spark = ({ data, color }) => {
  const ref = useRef(null);
  useEffect(() => {
    if(!ref.current) return;
    const ctx = ref.current.getContext('2d');
    const W = ref.current.width, H = ref.current.height;
    ctx.clearRect(0,0,W,H);
    if (!data.length) return;
    const mn = Math.min(...data), mx = Math.max(...data);
    const rng = mx-mn || 1;
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, color+'66');
    grad.addColorStop(1, color+'00');
    ctx.beginPath();
    data.forEach((v,i)=>{
      const x = (i/(data.length-1))*W;
      const y = H - ((v-mn)/rng)*(H-4) - 2;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.6;
    ctx.stroke();
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();
  }, [data, color]);
  return <canvas ref={ref} width="160" height="40" className="mini-chart" style={{width:80,height:36}}/>;
};

/* generate spark data */
const useSparks = (coins) => {
  const sparks = useRef({});
  coins.forEach(c => {
    if(!sparks.current[c.id]) sparks.current[c.id] = Array.from({length:24},(_,i)=>c.price*(1+(Math.sin(i/3)*0.01)+(Math.random()-0.5)*0.005));
    else {
      const a = sparks.current[c.id]; a.push(c.price); if(a.length>24) a.shift();
    }
  });
  return sparks.current;
};

    points[points.length-1] = base;

    const ctx = ref.current.getContext('2d');
    const grad = ctx.createLinearGradient(0,0,0,300);
    grad.addColorStop(0,'rgba(122,92,255,.5)');
    grad.addColorStop(1,'rgba(0,229,255,0)');

    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new Chart(ctx, {
      type:'line',
      data:{ labels, datasets:[{
        label: coin, data: points,
        borderColor:'#7a5cff',
        backgroundColor:grad,
        borderWidth:2.5, tension:.4, fill:true, pointRadius:0,
        pointHoverRadius:6, pointHoverBackgroundColor:'#00e5ff', pointHoverBorderColor:'#fff',
      }]},
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{
          backgroundColor:'rgba(10,10,25,.95)', borderColor:'#7a5cff', borderWidth:1, padding:10,
          titleColor:'#fff', bodyColor:'#9aa3c7',
        }},
        scales:{
          x:{ grid:{display:false}, ticks:{color:'#646b8c', font:{size:10}}},
          y:{ grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#646b8c', font:{size:10}, callback:v=>'$'+fmtCompact(v)}}
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [coin, coins.length]);

  return <canvas ref={ref}/>;
};

/* =========================================================
   Portfolio Donut
   ========================================================= */
const PortfolioDonut = ({ data }) => {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    const ctx = ref.current.getContext('2d');
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx, {
      type:'doughnut',
      data:{ labels:data.map(d=>d.name),
        datasets:[{ data:data.map(d=>d.val), backgroundColor:data.map(d=>d.color),
          borderColor:'rgba(10,10,25,.8)', borderWidth:3, hoverOffset:10 }]},
      options:{ cutout:'70%', plugins:{ legend:{display:false}, tooltip:{
        backgroundColor:'rgba(10,10,25,.95)', borderColor:'#7a5cff', borderWidth:1
      }}}
    });
    return () => { if(chartRef.current) chartRef.current.destroy() }
  },[data]);
  return <canvas ref={ref}/>;
};

/* ---------- CONVERTER ---------- */
const Converter = ({ fx, coins }) => {
  const [amount, setAmount] = useState(100);
  const [from, setFrom] = useState('USD');
  const [to, setTo] = useState('IDR');

  const allRates = useMemo(()=>{
    // USD-based
    const base = { USD:1, IDR:15723.5, EUR:1/1.0842, GBP:1/1.2693, JPY:154.82, SGD:1.3421, AUD:1/0.6587 };
    fx.forEach(f => {
      const [a,b] = f.pair.split('/');
      if (a==='USD') base[b] = f.rate;
      if (b==='USD') base[a] = 1/f.rate;
    });
    coins.forEach(c => { base[c.id] = 1/c.price; }); // 1 USD = 1/p crypto
    return base;
  },[fx, coins]);

  const currencies = Object.keys(allRates);
  const usdAmount = amount / (allRates[from] || 1);
  const result = usdAmount * (allRates[to] || 1);

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Currency Converter <small>Real-time rates · Updated every 2.5 seconds</small></div>
      </div>
      <div className="dash-grid" style={{gridTemplateColumns:'1fr 1fr'}}>
        <div className="glass card">
          <div className="card-title"><span className="icon-wrap"><Icon name="swap" size={14} color="var(--neon-1)"/></span>Convert</div>
          <div className="field">
            <label>Amount</label>
            <input className="input" type="number" value={amount} onChange={e=>setAmount(parseFloat(e.target.value)||0)}/>
          </div>
          <div className="flex gap-12" style={{alignItems:'flex-end'}}>
            <div className="grow field" style={{margin:0}}>
              <label>From</label>
              <select className="input" value={from} onChange={e=>setFrom(e.target.value)}>
                {currencies.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <button className="icon-btn" onClick={()=>{ const t=from; setFrom(to); setTo(t); }} style={{height:42}}>
              <Icon name="swap" size={16}/>
            </button>
            <div className="grow field" style={{margin:0}}>
              <label>To</label>
              <select className="input" value={to} onChange={e=>setTo(e.target.value)}>
                {currencies.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div className="divider"/>
          <div style={{padding:18, borderRadius:12, background:'var(--grad-card)', border:'1px solid var(--border)'}}>
            <div className="fz-11 text-mute" style={{letterSpacing:1.5, textTransform:'uppercase'}}>Result</div>
            <div className="fz-24 fw-800 grad-text" style={{marginTop:6, wordBreak:'break-all'}}>
              {fmt(result, result<1?6:2)} <span style={{fontSize:14, color:'var(--text-dim)'}}>{to}</span>
            </div>
            <div className="fz-12 text-mute" style={{marginTop:6}}>
              1 {from} = {fmt((allRates[to]||1)/(allRates[from]||1), 6)} {to}
            </div>
          </div>
        </div>

        <div className="glass card">
          <div className="card-title"><span className="icon-wrap"><Icon name="globe" size={14} color="var(--neon-3)"/></span>Popular Rates</div>
          {[
            ['USD','EUR'],['USD','GBP'],['USD','JPY'],['USD','IDR'],['EUR','GBP'],['USD','SGD'],
          ].map(([a,b]) => {
            const r = (allRates[b]||1)/(allRates[a]||1);
            return (
              <div key={`${a}-${b}`} className="tx-row">
                <div className="tx-icon" style={{background:'var(--grad-2)', fontSize:10}}>{a}/{b}</div>
                <div className="tx-body">
                  <div className="tx-title">{a} → {b}</div>
                  <div className="tx-sub">1 {a}</div>
                </div>
                <div className="tx-amt">{fmt(r, r<10?4:2)}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

const LoanCalc = () => {
  const [p,setP] = useState(50000); const [r,setR] = useState(7.5); const [n,setN] = useState(60);
  const mr = r/100/12;
  const m = mr ? p*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1) : p/n;
  const total = m*n; const interest = total-p;
  return (<>
    <div className="field"><label>Loan Amount ($)</label><input className="input" type="number" value={p} onChange={e=>setP(+e.target.value||0)}/></div>
    <div className="field"><label>Annual Interest Rate (%)</label><input className="input" type="number" step="0.1" value={r} onChange={e=>setR(+e.target.value||0)}/></div>
    <div className="field"><label>Term (months)</label><input className="input" type="number" value={n} onChange={e=>setN(+e.target.value||0)}/></div>
    <ResultBox items={[
      {label:'Monthly Payment', value:fmtCur(m), color:'var(--neon-1)'},
      {label:'Total Payment',   value:fmtCur(total)},
      {label:'Total Interest',  value:fmtCur(interest), color:'var(--neon-6)'},
    ]}/>
  </>);
};

const CompoundCalc = () => {
  const [p,setP] = useState(10000); const [r,setR] = useState(8); const [y,setY] = useState(10); const [c,setC] = useState(500);
  const monthlyR = r/100/12; const months = y*12;
  let bal = p;
  for(let i=0;i<months;i++) bal = bal*(1+monthlyR) + c;
  const contributed = p + c*months; const earned = bal - contributed;
  return (<>
    <div className="field"><label>Initial Amount ($)</label><input className="input" type="number" value={p} onChange={e=>setP(+e.target.value||0)}/></div>
    <div className="field"><label>Monthly Contribution ($)</label><input className="input" type="number" value={c} onChange={e=>setC(+e.target.value||0)}/></div>
    <div className="field"><label>Annual Return (%)</label><input className="input" type="number" step="0.1" value={r} onChange={e=>setR(+e.target.value||0)}/></div>
    <div className="field"><label>Years</label><input className="input" type="number" value={y} onChange={e=>setY(+e.target.value||0)}/></div>
    <ResultBox items={[
      {label:`Future Value (${y} years)`, value:fmtCur(bal), color:'var(--neon-4)'},
      {label:'Total Contributed',         value:fmtCur(contributed)},
      {label:'Interest Earned',           value:fmtCur(earned), color:'var(--neon-5)'},
    ]}/>
  </>);
};

const InflationCalc = () => {

const TaxCalc = () => {
  const [inc,setInc] = useState(75000);
  // Simplified US 2024 brackets
  const brackets=[[11600,.10],[47150,.12],[100525,.22],[191950,.24],[243725,.32],[609350,.35],[Infinity,.37]];
  let tax=0, prev=0;
  for(const [b,r] of brackets){ if(inc>b){ tax+=(b-prev)*r; prev=b; } else { tax+=(inc-prev)*r; break; }}
  return (<>
    <div className="field"><label>Annual Income ($)</label><input className="input" type="number" value={inc} onChange={e=>setInc(+e.target.value||0)}/></div>
    <p className="fz-11 text-mute">Based on simplified 2024 US federal brackets, single filer.</p>
    <ResultBox items={[
      {label:'Estimated Federal Tax', value:fmtCur(tax), color:'var(--neon-6)'},
      {label:'Effective Tax Rate', value:`${((tax/inc)*100).toFixed(2)}%`, color:'var(--neon-5)'},
      {label:'Take-home (approx)', value:fmtCur(inc-tax), color:'var(--neon-4)'},

  </>);
};

const ExpenseTracker = () => {
  const [items,setItems] = useState([
    { id:1, name:'Groceries', cat:'Food', amt:240 },
    { id:2, name:'Netflix', cat:'Entertainment', amt:15.99 },
    { id:3, name:'Gas', cat:'Transport', amt:60 },
  ]);
  const [n,setN] = useState(''); const [a,setA] = useState('');

const DebtPayoff = () => {
  const [bal,setBal] = useState(5000); const [r,setR] = useState(18); const [pay,setPay] = useState(200);
  const mr = r/100/12;
  let months=0, b=bal, totalI=0;
  while(b>0 && months<600){ const i=b*mr; totalI+=i; b=b+i-pay; months++; if(pay<=b*mr){ months=Infinity; break; } }
  return (<>
    <div className="field"><label>Debt Balance ($)</label><input className="input" type="number" value={bal} onChange={e=>setBal(+e.target.value||0)}/></div>
    <div className="field"><label>Interest Rate APR (%)</label><input className="input" type="number" step="0.1" value={r} onChange={e=>setR(+e.target.value||0)}/></div>
    <div className="field"><label>Monthly Payment ($)</label><input className="input" type="number" value={pay} onChange={e=>setPay(+e.target.value||0)}/></div>
    <ResultBox items={[
      {label:'Months to Payoff', value: isFinite(months)?`${months} months`:'Never (pay > interest)', color:'var(--neon-1)'},
      {label:'Total Interest Paid', value: isFinite(months)?fmtCur(totalI):'—', color:'var(--neon-6)'},
    ]}/>
  </>);
};

const InvestSim = () => {
  const [start,setStart] = useState(10000); const [add,setAdd] = useState(300); const [y,setY] = useState(15); const [r,setR] = useState(10);
  const months=y*12; const mr=r/100/12;
  let bal=start; const path=[];
  for(let i=0;i<months;i++){ bal=bal*(1+mr)+add; if(i%12===11) path.push(bal); }
  const contrib = start + add*months;
  return (<>
    <div className="field"><label>Initial ($)</label><input className="input" type="number" value={start} onChange={e=>setStart(+e.target.value||0)}/></div>
    <div className="field"><label>Monthly Add ($)</label><input className="input" type="number" value={add} onChange={e=>setAdd(+e.target.value||0)}/></div>

};

const RiskAnalyzer = () => {
  const [alloc,setAlloc] = useState({stocks:60, bonds:20, crypto:10, cash:10});
  const total = Object.values(alloc).reduce((s,v)=>s+v,0);
  const risks = {stocks:0.18, bonds:0.05, crypto:0.65, cash:0.01};
  const score = total ? (alloc.stocks*risks.stocks + alloc.bonds*risks.bonds + alloc.crypto*risks.crypto + alloc.cash*risks.cash)/total*100 : 0;
  const level = score<10?'Conservative':score<20?'Moderate':score<35?'Aggressive':'High Risk';
  return (<>
    {Object.keys(alloc).map(k => (
      <div key={k} className="field">
        <label>{k} (%)</label>
        <input className="input" type="number" value={alloc[k]} onChange={e=>setAlloc({...alloc,[k]:+e.target.value||0})}/>
      </div>
    ))}
    <p className="fz-11 text-mute">Total allocation: {total}% {total!==100 && <span className="text-down">(should equal 100%)</span>}</p>
    <ResultBox items={[
      {label:'Volatility Score', value:`${score.toFixed(2)}%`, color:'var(--neon-5)'},
      {label:'Risk Profile', value:level, color: score<20?'var(--neon-4)':score<35?'var(--neon-5)':'var(--neon-6)'},
    ]}/>
  </>);
};

const LessonModal = ({ lesson, onClose, progress, setProgress }) => {
  const [step, setStep] = useState(0);
  const [mode, setMode] = useState('lesson');
  const [answers, setAnswers] = useState({});
  const [showResult, setShowResult] = useState(false);
  const toast = useToast();

  if (!lesson) return null;
  const totalSteps = lesson.steps.length;
  const isLast = step >= totalSteps;

  const next = () => {
    if (step < totalSteps-1) setStep(step+1);
    else {
      // mark steps complete
      setProgress(p => ({
        ...p,
        [lesson.id]: {
          ...(p[lesson.id]||{}),
          steps: totalSteps,
          xp: Math.max((p[lesson.id]?.xp)||0, 30),
        }
      }));
      setMode('quiz');
    }
  };

  const submitQuiz = () => {
    const correct = lesson.quiz.filter((q,i)=>answers[i]===q.a).length;
    const xp = correct*20 + 30;
    setProgress(p => ({
      ...p,
      [lesson.id]: { steps: totalSteps, xp, quiz: correct }
    }));
    setShowResult(true);
    toast(`+${xp} XP earned!`, 'success');
  };

  return (
    <div className="modal-bd" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:600}}>
        <div className="modal-head">
          <div className="flex center gap-12">
            <div className="stat-icon" style={{width:36,height:36,background:`linear-gradient(135deg, ${lesson.color1}, ${lesson.color2})`, fontSize:18}}>
              {lesson.emoji}
            </div>
            <div>
              <div className="modal-title">{lesson.title}</div>
              <div className="fz-11 text-mute">
                {mode==='lesson' ? `Step ${Math.min(step+1, totalSteps)} of ${totalSteps}` : 'Knowledge Check'}
              </div>
            </div>
          </div>
          <button className="modal-close" onClick={onClose}><Icon name="close" size={14}/></button>
        </div>
        <div className="modal-body">
          {mode==='lesson' && (
            <>
              {step===0 && (
                <div style={{padding:14, borderRadius:12, background:'var(--grad-card)', border:'1px solid var(--border)', marginBottom:14}}>
                  <div className="flex center gap-8 mb-12">
                    <span className="fz-11 fw-800" style={{padding:'3px 10px', borderRadius:20, background:'var(--grad-3)', color:'#fff'}}>ELI5</span>
                    <span className="fz-12 text-dim">Explain Like I'm 5</span>
                  </div>
                  <p className="fz-13" style={{lineHeight:1.7}}>{lesson.eli5}</p>
                </div>
              )}
              <div className="progress-bar mb-20"><div className="progress-fill" style={{width:`${((step+1)/totalSteps)*100}%`}}/></div>
              <h3 className="fz-18 fw-800 mb-12">{lesson.steps[step].t}</h3>
              <p className="fz-13 text-dim" style={{lineHeight:1.7}}>{lesson.steps[step].d}</p>
              <div className="flex between mt-20 gap-12">
                {step>0 && <button className="btn ghost" onClick={()=>setStep(step-1)}>← Back</button>}
                <button className="btn" style={{marginLeft:'auto'}} onClick={next}>
                  {step===totalSteps-1 ? 'Take Quiz' : 'Next →'}
                </button>
              </div>
            </>
          )}
          {mode==='quiz' && (
            <>
              <div className="flex center gap-8 mb-20">
                <Icon name="trophy" size={18} color="var(--neon-5)"/>
                <span className="fz-13 fw-700">Quick Quiz · Earn up to 70 XP</span>
              </div>
              {lesson.quiz.map((q,qi)=>(
                <div key={qi} className="mb-20">
                  <p className="fz-13 fw-700 mb-12">{qi+1}. {q.q}</p>
                  {q.opts.map((o,oi)=>{
                    const sel = answers[qi]===oi;
                    let cls = 'quiz-opt';
                    if (showResult && q.a===oi) cls += ' correct';
                    else if (showResult && sel && q.a!==oi) cls += ' wrong';

                    return (
                      <div key={oi} className={cls} onClick={()=>!showResult && setAnswers({...answers, [qi]:oi})}>

                  })}

              ))}
              {!showResult ? (
                <button className="btn" style={{width:'100%'}} onClick={submitQuiz}
                  disabled={Object.keys(answers).length<lesson.quiz.length}>
                  Submit Quiz <Icon name="check" size={14}/>

              ) : (
                <div style={{padding:18, borderRadius:12, background:'var(--grad-card)', border:'1px solid var(--border)', textAlign:'center'}}>

                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
};

      </div>
      <div className="glass">
        <div className="chat-wrap">
          <div ref={scrollRef} className="chat-msgs">
            {msgs.map((m,i)=>(
              <div key={i} className={`msg ${m.who}`}>{m.t}</div>
            ))}
          </div>
          <div style={{padding:'8px 12px', borderTop:'1px solid var(--border)'}}>
            <div className="flex gap-8 wrap">
              {quickQs.map(q => (
                <div key={q} className="tab" style={{fontSize:11, padding:'5px 10px'}} onClick={()=>{ setText(q); setTimeout(send, 50); }}>{q}</div>
              ))}
            </div>
          </div>
          <div className="chat-input-bar">
            <input className="input" placeholder="Ask Veth-AI anything about finance..."
              value={text} onChange={e=>setText(e.target.value)}
              onKeyDown={e=>e.key==='Enter' && send()}/>
            <button className="btn" onClick={send}><Icon name="send" size={14}/></button>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ---------- PORTFOLIO ---------- */
const Portfolio = ({ coins }) => {
  const holdings = [
    { id:'BTC', name:'Bitcoin', qty:0.85, buy:54200 },
    { id:'ETH', name:'Ethereum', qty:6.4, buy:2900 },
    { id:'SOL', name:'Solana', qty:42, buy:142 },
    { id:'AVAX', name:'Avalanche', qty:28, buy:42 },
  ];
  const enriched = holdings.map(h => {
    const c = coins.find(x=>x.id===h.id) || {price:h.buy, color:'#7a5cff'};
    const val = c.price*h.qty;
    const cost = h.buy*h.qty;
    return { ...h, price:c.price, color:c.color, val, cost, pnl:val-cost, pct:((val-cost)/cost*100) };
  });
  const total = enriched.reduce((s,h)=>s+h.val,0);
  const cost = enriched.reduce((s,h)=>s+h.cost,0);
  const pnl = total-cost;
  return (
    <div>
      <div className="page-header">
        <div className="page-title">My Portfolio <small>Real-time valuation</small></div>
        <button className="btn"><Icon name="plus" size={14}/> Add Position</button>
      </div>
      <div className="stats-grid">
        <Stat color="var(--neon-2)" label="Total Value" value={fmtCur(total)} change={`${(pnl/cost*100).toFixed(2)}%`} icon="wallet" up={pnl>=0}/>
        <Stat color="var(--neon-4)" label="Total Cost" value={fmtCur(cost)} change="Invested" icon="bag" up/>
        <Stat color={pnl>=0?'var(--neon-4)':'var(--neon-6)'} label="Unrealized P/L" value={`${pnl>=0?'+':''}${fmtCur(pnl)}`} change={`${(pnl/cost*100).toFixed(2)}%`} icon="chart" up={pnl>=0}/>
        <Stat color="var(--neon-5)" label="Positions" value={`${enriched.length}`} change="Active" icon="portfolio" up/>
      </div>
      <div className="glass card" style={{overflowX:'auto'}}>
        <table className="tbl">
          <thead><tr><th>Asset</th><th>Quantity</th><th>Buy Avg</th><th>Current</th><th>Value</th><th>P/L</th></tr></thead>
          <tbody>
            {enriched.map(h => (
              <tr key={h.id}>
                <td><div className="coin-cell"><div className="coin-icon" style={{background:`linear-gradient(135deg,${h.color},${h.color}aa)`}}>{h.id.slice(0,2)}</div><div><div className="coin-sym">{h.id}</div><div className="coin-name">{h.name}</div></div></div></td>
                <td className="fw-700">{h.qty}</td>
                <td className="text-dim">${fmt(h.buy)}</td>
                <td className="fw-700">${fmt(h.price)}</td>
                <td className="fw-700">${fmt(h.val)}</td>
                <td><span className={h.pnl>=0?'up':'down'} style={{padding:'3px 8px', borderRadius:6, fontSize:12, fontWeight:700}}>{h.pnl>=0?'+':''}${fmt(h.pnl)} ({h.pct.toFixed(2)}%)</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ---------- SETTINGS ---------- */
const Settings = ({ theme, setTheme, user, onLogout }) => {
  const toast = useToast();
  const exportData = () => {
    const data = { user, exported:new Date().toISOString(), progress: JSON.parse(localStorage.getItem('cryveth_progress')||'{}') };
    const blob = new Blob([JSON.stringify(data,null,2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='cryveth_data.json'; a.click();
    URL.revokeObjectURL(url);
    toast('Data exported successfully','success');
  };
  return (
    <div>
      <div className="page-header"><div className="page-title">Settings <small>Customize your CryVeth experience</small></div></div>
      <div className="dash-grid" style={{gridTemplateColumns:'1fr 1fr'}}>
        <div className="glass card">
          <div className="card-title"><span className="icon-wrap"><Icon name="user" size={14} color="var(--neon-2)"/></span>Profile</div>
          <div className="field"><label>Name</label><input className="input" defaultValue={user?.name}/></div>
          <div className="field"><label>Email</label><input className="input" defaultValue={user?.email}/></div>
          <div className="field"><label>Member Since</label><input className="input" defaultValue={new Date(user?.joined||Date.now()).toLocaleDateString()} disabled/></div>
          <button className="btn">Save Changes</button>
        </div>
        <div className="glass card">
          <div className="card-title"><span className="icon-wrap"><Icon name="settings" size={14} color="var(--neon-3)"/></span>Preferences</div>
          <div className="field"><label>Theme</label>
            <div className="btn-row">
              <button className={`btn ${theme==='dark'?'':'ghost'}`} onClick={()=>setTheme('dark')}><Icon name="moon" size={14}/> Dark</button>
              <button className={`btn ${theme==='light'?'':'ghost'}`} onClick={()=>setTheme('light')}><Icon name="sun" size={14}/> Light</button>
            </div>
          </div>
          <div className="field"><label>Default Currency</label>
            <select className="input"><option>USD</option><option>EUR</option><option>GBP</option><option>IDR</option></select>
          </div>
          <div className="field"><label>Language</label>
            <select className="input"><option>English</option><option>Spanish</option><option>Indonesian</option><option>Japanese</option><option>French</option></select>
          </div>
          <div className="field"><label>Price Alerts</label>
            <select className="input"><option>Enabled · All Coins</option><option>Top 10 Only</option><option>Disabled</option></select>
          </div>
        </div>
        <div className="glass card">
          <div className="card-title"><span className="icon-wrap"><Icon name="shield" size={14} color="var(--neon-4)"/></span>Security</div>
          <p className="fz-12 text-dim mb-12">Authentication uses JWT with 24h expiry. Passwords hashed with bcrypt. Optional 2FA.</p>
          <button className="btn ghost mb-12"><Icon name="lock" size={14}/> Change Password</button>
          <button className="btn ghost"><Icon name="shield" size={14}/> Enable 2FA</button>
        </div>
        <div className="glass card">
          <div className="card-title"><span className="icon-wrap"><Icon name="download" size={14} color="var(--neon-5)"/></span>Data & Export</div>
          <p className="fz-12 text-dim mb-12">Export your transactions, learning progress and tool usage history.</p>
          <button className="btn mb-12" onClick={exportData}><Icon name="download" size={14}/> Export Data (JSON)</button>
          <button className="btn danger" onClick={onLogout}><Icon name="logout" size={14}/> Sign Out</button>
        </div>
      </div>
    </div>
  );
};

/* =========================================================
   ROOT APP
   ========================================================= */
const App = () => {
  const [route, setRoute] = useState('dashboard');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [collapsed, setCollapsed] = useState(false);
  const [notifOpen, setNotifOpen] = useState(false);
  const [theme, setTheme] = useState(localStorage.getItem('cryveth_theme') || 'dark');
  const [user, setUser] = useState(()=> {
    try { return JSON.parse(localStorage.getItem('cryveth_user') || 'null') } catch { return null }
  });
  const [authed, setAuthed] = useState(!!localStorage.getItem('cryveth_token'));
  const [tool, setTool] = useState(null);
  const [lesson, setLesson] = useState(null);
  const [progress, setProgressState] = useState(()=>{
    try { return JSON.parse(localStorage.getItem('cryveth_progress')||'{}') } catch { return {} }
  });
  const setProgress = (updater) => {
    setProgressState(prev => {
      const next = typeof updater==='function' ? updater(prev) : updater;
      localStorage.setItem('cryveth_progress', JSON.stringify(next));
      return next;
    });
  };
  const { coins, fx } = useLiveMarket();

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('cryveth_theme', theme);
  },[theme]);

  // recompute xp into user
  const totalXP = useMemo(()=>Object.values(progress).reduce((s,p)=>s+(p.xp||0),0),[progress]);
  const userWithXP = useMemo(()=>({...(user||{}), xp:totalXP, level:Math.floor(totalXP/100)+1}),[user,totalXP]);

  if (!authed) return <ToastProvider><Auth onAuth={()=>{
    setAuthed(true);
    try { setUser(JSON.parse(localStorage.getItem('cryveth_user') || 'null')); } catch {}
  }}/></ToastProvider>;

  const navItems = [
    { id:'dashboard', label:'Dashboard',  icon:'dashboard' },
    { id:'markets',   label:'Markets',    icon:'chart',   badge:'LIVE' },
    { id:'portfolio', label:'Portfolio',  icon:'portfolio'},
    { id:'converter', label:'Converter',  icon:'swap'     },
    { id:'tools',     label:'Tools',      icon:'tools',   badge:'30+' },
    { id:'learn',     label:'Learn',      icon:'learn',   badge:'XP'  },
    { id:'ai',        label:'AI Assistant', icon:'chat'   },
    { id:'settings',  label:'Settings',   icon:'settings' },
  ];

  const notifications = [
    { icon:'arrowUp', color:'var(--neon-4)', t:'BTC crossed $67,000', sub:'Price alert triggered · 2m ago' },
    { icon:'trophy', color:'var(--neon-5)', t:'Lesson complete: Saving Smart', sub:'+50 XP earned · 1h ago' },
    { icon:'bell', color:'var(--neon-2)', t:'ETH weekly summary ready', sub:'Open Markets to view · 3h ago' },
    { icon:'shield', color:'var(--neon-3)', t:'New device login', sub:'Verified from Chrome · 1d ago' },
  ];

  return (
    <ToastProvider>
      <div className={`app ${collapsed?'collapsed':''}`}>
        {/* SIDEBAR */}
        <aside className={`sidebar ${sidebarOpen?'open':''}`}>
          <div className="brand" onClick={()=>setCollapsed(c=>!c)} style={{cursor:'pointer'}}>
            <div className="brand-logo">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L3 7v6c0 5 3.5 9.5 9 11 5.5-1.5 9-6 9-11V7l-9-5z" stroke="url(#g2)" strokeWidth="2" fill="rgba(122,92,255,.2)"/>
                <path d="M8 12l3 3 5-6" stroke="#00e5ff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                <defs><linearGradient id="g2"><stop offset="0" stopColor="#00e5ff"/><stop offset="1" stopColor="#ff3df0"/></linearGradient></defs>
              </svg>
            </div>
            <div>
              <div className="brand-name">CryVeth</div>
              <div className="brand-tag">FINANCE • LEARN • GROW</div>
            </div>
          </div>

          <div className="nav-section">Main</div>
          {navItems.slice(0,5).map(n => (
            <div key={n.id} className={`nav-item ${route===n.id?'active':''}`}
              onClick={()=>{ setRoute(n.id); setSidebarOpen(false); }}>
              <span className="icon icon-wrap"><Icon name={n.icon} size={18} color={route===n.id?'var(--neon-1)':'currentColor'}/></span>
              <span>{n.label}</span>
              {n.badge && <span className="badge">{n.badge}</span>}
            </div>
          ))}
          <div className="nav-section">Personal</div>
          {navItems.slice(5).map(n => (
            <div key={n.id} className={`nav-item ${route===n.id?'active':''}`}
              onClick={()=>{ setRoute(n.id); setSidebarOpen(false); }}>
              <span className="icon icon-wrap"><Icon name={n.icon} size={18} color={route===n.id?'var(--neon-1)':'currentColor'}/></span>
              <span>{n.label}</span>
              {n.badge && <span className="badge">{n.badge}</span>}
            </div>
          ))}

          <div className="sidebar-footer">
            <h4>Upgrade to Pro</h4>
            <p>Unlock AI deep insights, alerts, and premium tools.</p>
            <button className="btn-pro">Upgrade Now</button>
          </div>
        </aside>

        {/* TOPBAR */}
        <header className="topbar">
          <button className="menu-btn" onClick={()=>setSidebarOpen(s=>!s)}><Icon name="menu" size={18}/></button>
          <div className="search-wrap">
            <span className="search-icon"><Icon name="search" size={16}/></span>
            <input className="search-input" placeholder="Search markets, tools, lessons..."/>
          </div>
          <div className="topbar-actions">
            <button className="icon-btn" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')} title="Toggle theme">
              <Icon name={theme==='dark'?'sun':'moon'} size={16}/>
            </button>
            <div style={{position:'relative'}}>
              <button className="icon-btn" onClick={()=>setNotifOpen(s=>!s)}>
                <Icon name="bell" size={16}/>
                <span className="dot"/>
              </button>
              {notifOpen && (
                <div className="dropdown" style={{top:48, right:0}}>
                  <div style={{padding:'12px 14px', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between'}}>
                    <span className="fw-700 fz-13">Notifications</span>
                    <span className="fz-11 text-mute">4 new</span>
                  </div>
                  {notifications.map((n,i)=>(
                    <div key={i} className="notif-item">
                      <div className="notif-icon" style={{background:`linear-gradient(135deg,${n.color},${n.color}88)`, boxShadow:`0 0 12px ${n.color}55`}}>
                        <Icon name={n.icon} size={14}/>
                      </div>
                      <div className="notif-txt">
                        <div className="notif-title">{n.t}</div>
                        <div className="notif-time">{n.sub}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="profile" onClick={()=>setRoute('settings')}>
              <div className="avatar">{(user?.name || 'U').charAt(0).toUpperCase()}</div>
              <div>
                <div className="profile-name">{(user?.name || 'User').split(' ')[0]}</div>
                <div className="profile-role">Lv {userWithXP.level} · {totalXP} XP</div>
              </div>
            </div>
          </div>
        </header>

        {/* MAIN */}
        <main className="main">
          {route==='dashboard' && <Dashboard coins={coins} fx={fx} user={userWithXP}/>}
          {route==='markets'   && <Markets coins={coins} fx={fx}/>}
          {route==='portfolio' && <Portfolio coins={coins}/>}
          {route==='converter' && <Converter fx={fx} coins={coins}/>}
          {route==='tools'     && <Tools openTool={setTool}/>}
          {route==='learn'     && <Learn progress={progress} setProgress={setProgress} openLesson={setLesson}/>}
          {route==='ai'        && <AIChat/>}
          {route==='settings'  && <Settings theme={theme} setTheme={setTheme} user={user} onLogout={()=>{
            localStorage.removeItem('cryveth_token'); localStorage.removeItem('cryveth_user'); setAuthed(false);
          }}/>}
        </main>

        <div className={`bd-overlay ${sidebarOpen?'show':''}`} onClick={()=>setSidebarOpen(false)}/>
      </div>

      {tool && <ToolModal tool={tool} onClose={()=>setTool(null)}/>}
      {lesson && <LessonModal lesson={lesson} onClose={()=>setLesson(null)} progress={progress} setProgress={setProgress}/>}
    </ToastProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
